services:
  database:
    image: postgres:17
    networks:
      - internal
    ports:
      - '${DB_PORT}:5432'
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_DB=${DB_DATABASE_NAME}
    volumes:
      - ./db-data/:/var/lib/postgresql/data/

networks:
  internal:
    internal: true

volumes:
  postgres-data:
