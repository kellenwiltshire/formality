services:
  database:
    image: postgres:17
    networks:
      - internal
      - default
    ports:
      - '${DB_PORT}:5432'
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_DB=${DB_DATABASE_NAME}
    volumes:
      - './db-data:/var/lib/postgresql/data/:rw'

  formality:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - 8080:8080
    networks:
      - internal
      - default
    depends_on:
      - database
    env_file:
      - .env
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_USERNAME=${DB_USERNAME}
      - DB_DATABASE_NAME=${DB_DATABASE_NAME}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_PASS=${ADMIN_PASS}

networks:
  default:
  internal:
    internal: true
